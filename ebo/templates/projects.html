{% extends "base.html" %} {% load static %} {% block content1 %}
<style>
 .project-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:30px;
    padding:40px;
}

.project{
    background:#1a1a1a;
    border-radius:18px;
    overflow:hidden;
    transition:.3s;
    border:1px solid rgba(241,196,15,.15);
}

.project:hover{
    transform:translateY(-10px);
    box-shadow:0 0 20px rgba(241,196,15,.25);
}

.project img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.project-title{
    display:block;
    padding:15px;
    color:white;
    font-size:1.2rem;
    font-weight:bold;
    text-decoration:none;
}

.section-heading{
    text-align:center;
    color:#f1c40f;
    margin:40px 0;
}

.project-title:hover{
    color:#f1c40f;
}
</style>

<div class="project-grid">
  <h1 class="section-heading">
    Featured Projects
</h1>
  {% for project in projects_show %}
  <div class="project">
    <a href="{{ project.link }}" target="_blank">
      <img src="{% static project.path %}" alt="{{ project.title }}" />
    </a>

    <a href="{{ project.link }}" target="_blank" class="project-title">
      {{ project.title }}
    </a>
  </div>
  {% endfor %}
</div>
{% endblock content1 %}
