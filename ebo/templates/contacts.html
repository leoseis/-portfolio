{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Us</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
    background: #020617;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 30px 15px;
    font-family: 'Segoe UI', sans-serif;
}

.contact-wrapper {
    width: 100%;
    max-width: 650px;
    background: #111827;
    border: 1px solid rgba(241, 196, 15, .3);
    border-radius: 20px;
    padding: 40px;
    box-shadow: 0 0 30px rgba(13, 110, 253, .15);
    animation: fadeInUp .8s ease;
}

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }

    to {
        opacity: 1;
        transform: translateY(0);
    }
}

h2 {
    color: #f1c40f;
    text-align: center;
    margin-bottom: 10px;
    font-weight: 700;
}

.contact-subtitle {
    text-align: center;
    color: #cbd5e1;
    margin-bottom: 30px;
}

.form-label {
    color: white;
    font-weight: 500;
}

.form-control {
    background: #1e293b;
    border: 1px solid #334155;
    color: white;
    border-radius: 10px;
    padding: 12px;
}

.form-control::placeholder {
    color: #94a3b8;
}

.form-control:focus {
    background: #1e293b;
    color: white;
    border-color: #0d6efd;
    box-shadow: 0 0 15px rgba(13,110,253,.25);
}

.btn-primary {
    width: 100%;
    background: #f1c40f;
    border: none;
    color: #000;
    font-weight: 600;
    padding: 14px;
    border-radius: 10px;
    transition: .3s ease;
}

.btn-primary:hover {
    background: #ffd43b;
    transform: translateY(-2px);
}

.alert {
    border-radius: 10px;
}

.contact-info {
    display: flex;
    justify-content: center;
    gap: 25px;
    margin-bottom: 30px;
    flex-wrap: wrap;
}

.contact-info span {
    color: #cbd5e1;
    font-size: .95rem;
}

@media(max-width:768px){

    body{
        padding:20px 10px;
        align-items:flex-start;
    }

    .contact-wrapper{
        padding:25px;
        border-radius:15px;
    }

    h2{
        font-size:2rem;
    }

    .contact-info{
        flex-direction:column;
        text-align:center;
        gap:10px;
    }
}
  </style>
</head>
<body>

<div class="contact-wrapper">
  <h2>Contact Us</h2>
  <p class="contact-subtitle">
    Let's discuss your next project, freelance opportunity or collaboration.
</p>

<div class="contact-info">
    <span>📧 leonard@example.com</span>
    <span>💻 Full-Stack Developer</span>
    <span>📍 Lagos, Nigeria</span>
</div>

  {% if messages %}
    {% for message in messages %}
      <div class="alert alert-{{ message.tags }}">{{ message }}</div>
    {% endfor %}
  {% endif %}

  <form method="POST" action="{% url 'contacts' %}">
    {% csrf_token %}

    <div class="mb-3">
      <label class="form-label">Name *</label>
      <input type="text" name="name" class="form-control" placeholder="Your name" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Email *</label>
      <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Phone</label>
      <input type="text" name="phone" class="form-control" placeholder="Optional phone number">
    </div>

    <div class="mb-3">
      <label class="form-label">Message *</label>
      <textarea name="msg" class="form-control" rows="4" placeholder="Write your message here..." required></textarea>
    </div>

    <button type="submit" class="btn btn-primary">Send Message</button>
  </form>
</div>

</body>
</html>
